<h2>Your Leads</h2>
<table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Message</th>
    <th>Status</th>
    <th>Received</th>
  </tr>
  {% for lead in leads %}
  <tr>
    <td>{{ lead.name }}</td>
    <td>{{ lead.email }}</td>
    <td>{{ lead.message }}</td>
    <td>{{ lead.get_status_display }}</td>
    <td>{{ lead.created_at }}</td>
  </tr>
  {% empty %}
  <tr><td colspan="5">No leads yet.</td></tr>
  {% endfor %}
</table>
