<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LeadFlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: "#0f172a",
                        card: "#1e293b",
                        accent: "#6366f1",
                        accent2: "#22d3ee"
                    }
                }
            }
        }
    </script>
    </script>
    <style>
    /* Fade in */
    .fade-in {
        animation: fadeIn 0.6s ease forwards;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    /* Stagger animation */
    .stagger > * {
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.5s ease forwards;
    }
    .stagger > *:nth-child(1) { animation-delay: 0.1s; }
    .stagger > *:nth-child(2) { animation-delay: 0.2s; }
    .stagger > *:nth-child(3) { animation-delay: 0.3s; }
    .stagger > *:nth-child(4) { animation-delay: 0.4s; }
    /* Smooth hover lift */
    .hover-lift {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .hover-lift:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    /* Button press */
    .btn-press {
        transition: transform 0.1s ease;
    }
    .btn-press:active {
        transform: scale(0.96);
    }
    /* Glow effect */
    .glow:hover {
        box-shadow: 0 0 20px rgba(99,102,241,0.6);
    }
    </style>
</head>

<body class="bg-bg text-gray-100 min-h-screen">

        <div class="fixed top-0 left-0 w-full h-full pointer-events-none bg-gradient-to-br from-indigo-500/10 via-transparent to-cyan-400/10 blur-3xl"></div>

        <div class="max-w-md mx-auto p-4">
                {% block content %}{% endblock %}
        </div>

        <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.style.opacity = 0;
            setTimeout(() => {
                document.body.style.transition = "opacity 0.4s ease";
                document.body.style.opacity = 1;
            }, 50);
        });
        </script>

</body>
</html>
