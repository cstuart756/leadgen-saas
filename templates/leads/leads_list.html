{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-4">Your Leads</h2>

{% for lead in leads %}
<div class="bg-card p-4 rounded-2xl mb-3 shadow">
    <h3 class="font-semibold">{{ lead.name }}</h3>
    <p class="text-sm text-gray-400">{{ lead.email }}</p>
    <p class="mt-2">{{ lead.message }}</p>

    <span class="inline-block mt-3 px-3 py-1 text-xs rounded-full bg-accent">
        {{ lead.status }}
    </span>
</div>
{% endfor %}

{% endblock %}
